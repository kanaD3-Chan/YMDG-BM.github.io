name: 部署文档

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  deploy-gh-pages:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          # 如果你文档需要 Git 子模块，取消注释下一行
          # submodules: true

      - name: 设置 pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.0   # 与你的 lockfile 匹配

      - name: 设置 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      # 关键修改：首次安装时跳过所有构建脚本（避免因未批准而失败）
      - name: 安装依赖（跳过构建脚本）
        run: pnpm install --frozen-lockfile --ignore-scripts

      # 自动批准所有待运行的构建脚本（@parcel/watcher, esbuild 等）
      - name: 批准所有待处理的构建脚本
        run: pnpm approve-builds --all

      # 执行这些被批准的构建脚本（重新运行 install 或使用 rebuild）
      - name: 执行构建脚本
        run: pnpm rebuild

      - name: 构建文档
        env:
          NODE_OPTIONS: --max_old_space_size=8192
        run: |
          pnpm run docs:build
          touch src/.vuepress/dist/.nojekyll   # 避免 Jekyll 处理

      - name: 部署文档
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: gh-pages
          folder: src/.vuepress/dist
